<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetplayJS + Nostalgist Lockstep Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      color: #888;
      margin-bottom: 20px;
      text-align: center;
    }

    .container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 1200px;
      width: 100%;
    }

    .panel {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
      flex: 1;
      min-width: 300px;
      max-width: 500px;
    }

    .panel h2 {
      margin-bottom: 15px;
      color: #4ecdc4;
      font-size: 1.2rem;
    }

    .game-container {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-canvas {
      max-width: 100%;
      max-height: 100%;
      image-rendering: pixelated;
    }

    .controls {
      margin-top: 20px;
    }

    .btn {
      background: #4ecdc4;
      color: #1a1a2e;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s ease;
      margin: 5px;
    }

    .btn:hover {
      background: #45b7b8;
      transform: translateY(-2px);
    }

    .btn:disabled {
      background: #555;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: #e74c3c;
    }

    .btn-secondary:hover {
      background: #c0392b;
    }

    .input-group {
      margin: 15px 0;
    }

    .input-group label {
      display: block;
      margin-bottom: 5px;
      color: #aaa;
    }

    .input-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #444;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 1rem;
    }

    .status {
      margin-top: 15px;
      padding: 10px;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    .status.waiting {
      background: rgba(241, 196, 15, 0.2);
      color: #f1c40f;
    }

    .status.connected {
      background: rgba(46, 204, 113, 0.2);
      color: #2ecc71;
    }

    .status.error {
      background: rgba(231, 76, 60, 0.2);
      color: #e74c3c;
    }

    .status.info {
      background: rgba(52, 152, 219, 0.2);
      color: #3498db;
    }

    .players-list {
      margin-top: 15px;
    }

    .player-item {
      display: flex;
      align-items: center;
      padding: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      margin-bottom: 8px;
    }

    .player-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 10px;
    }

    .player-indicator.local {
      background: #2ecc71;
    }

    .player-indicator.remote {
      background: #3498db;
    }

    .latency-info {
      margin-left: auto;
      font-size: 0.8rem;
      color: #888;
    }

    .instructions {
      margin-top: 20px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
    }

    .instructions h3 {
      margin-bottom: 10px;
      color: #4ecdc4;
    }

    .instructions ul {
      margin-left: 20px;
      color: #aaa;
    }

    .instructions li {
      margin-bottom: 5px;
    }

    .key-badge {
      display: inline-block;
      padding: 2px 8px;
      background: #444;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.85rem;
    }

    #nostalgist-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rom-selector {
      margin: 15px 0;
    }

    .rom-selector select {
      width: 100%;
      padding: 10px;
      border: 1px solid #444;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 1rem;
    }

    .rom-selector option {
      background: #1a1a2e;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <h1>🎮 NetplayJS + Nostalgist Lockstep Demo</h1>
  <p class="subtitle">使用 lockstep 同步的多人复古游戏模拟器</p>

  <div class="container">
    <!-- 游戏面板 -->
    <div class="panel">
      <h2>游戏画面</h2>
      <div class="game-container">
        <div id="nostalgist-container">
          <p style="color: #666;">请选择一个游戏 ROM</p>
        </div>
        <canvas id="game-canvas" class="hidden"></canvas>
      </div>

      <div class="rom-selector">
        <label>选择游戏:</label>
        <select id="rom-select">
          <option value="">-- 选择内置游戏 --</option>
          <option value="chip8">Chip8 测试程序 (内置)</option>
          <option value="custom">上传自定义 ROM</option>
        </select>
      </div>

      <input type="file" id="rom-file" accept=".nes,.smc,.sfc,.gb,.gbc,.gba,.md,.bin" class="hidden">

      <div class="instructions">
        <h3>操作说明</h3>
        <ul>
          <li>方向键: <span class="key-badge">↑</span> <span class="key-badge">↓</span> <span class="key-badge">←</span> <span class="key-badge">→</span></li>
          <li>A 按钮: <span class="key-badge">Z</span></li>
          <li>B 按钮: <span class="key-badge">X</span></li>
          <li>Start: <span class="key-badge">Enter</span></li>
          <li>Select: <span class="key-badge">Shift</span></li>
        </ul>
      </div>
    </div>

    <!-- 联机面板 -->
    <div class="panel">
      <h2>联机设置</h2>

      <div class="input-group">
        <label>房间 ID (留空创建新房):</label>
        <input type="text" id="room-id" placeholder="输入房间 ID 加入">
      </div>

      <div class="input-group">
        <label>玩家名称:</label>
        <input type="text" id="player-name" placeholder="玩家" value="Player">
      </div>

      <div class="controls">
        <button class="btn" id="btn-host">创建房间</button>
        <button class="btn" id="btn-join">加入房间</button>
        <button class="btn btn-secondary hidden" id="btn-leave">离开房间</button>
      </div>

      <div id="status" class="status info" style="display: none;"></div>

      <div class="players-list" id="players-list">
        <h3 style="margin-bottom: 10px; color: #888; font-size: 1rem;">玩家列表</h3>
        <div id="players-container"></div>
      </div>

      <div class="instructions">
        <h3>Lockstep 同步说明</h3>
        <ul>
          <li>所有玩家的输入在每个帧同步</li>
          <li>确保游戏状态完全一致</li>
          <li>适合格斗游戏、合作游戏等对同步要求高的场景</li>
          <li>延迟会根据网络状况自动调整</li>
        </ul>
      </div>
    </div>
  </div>

  <!-- 加载 netplayjs -->
  <script src="https://unpkg.com/netplayjs@0.7.0/dist/netplay.js"></script>
  <!-- 加载 nostalgist -->
  <script src="https://unpkg.com/nostalgist@0.6.0/dist/nostalgist.js"></script>
  <script src="game.js"></script>
</body>
</html>
